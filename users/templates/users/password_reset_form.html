{% extends "base.html" %}
{% block title %}Password Reset{% endblock %}
{% block content %}
<h1 class="text-2xl mb-4">Password reset</h1>
<form method="post" class="space-y-4">{% csrf_token %}{{ form.as_p }}<button type="submit" class="bg-yellow-500 text-white px-4 py-2 rounded">Reset</button></form>
{% endblock %}
