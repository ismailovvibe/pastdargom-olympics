{% extends "base.html" %}
{% block title %}Yangi Savol - Admin Panel{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto my-10">
    <div class="bg-white rounded-lg shadow-lg p-8">
        <h1 class="text-2xl font-bold text-gray-800 mb-6">
            <i class="fas fa-plus text-green-600 mr-2"></i>Yangi Savol Yaratish
        </h1>
        
        <form method="POST" class="space-y-6" id="questionForm">
            {% csrf_token %}
            
            <!-- Question Text -->
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Savol Matni</label>
                <textarea name="text" rows="4" placeholder="Savolni yozing..." required class="w-full px-4 py-2 border-2 border-gray-300 rounded-lg focus:border-blue-500 focus:outline-none"></textarea>
            </div>
            
            <!-- Question Type -->
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Savol Turi</label>
                <select name="question_type" id="questionType" class="w-full px-4 py-2 border-2 border-gray-300 rounded-lg focus:border-blue-500 focus:outline-none">
                    <option value="text">📝 Matn Javob</option>
                    <option value="code">💻 Kod Javob</option>
                    <option value="multiple_choice">⭕ Bir Tanlash</option>
                </select>
            </div>
            
            <!-- Multiple Choice Options (hidden by default) -->
            <div id="mcOptions" class="hidden space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Variantlar (har biri yangi qatorga)</label>
                    <textarea name="mc_options" placeholder="Variant 1&#10;Variant 2&#10;Variant 3&#10;Variant 4" rows="5" class="w-full px-4 py-2 border-2 border-gray-300 rounded-lg focus:border-blue-500 focus:outline-none"></textarea>
                </div>
                
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">To'g'ri Javob Indeksi (0 dan boshlanadi)</label>
                    <input type="number" name="mc_answer" value="0" min="0" class="w-full px-4 py-2 border-2 border-gray-300 rounded-lg focus:border-blue-500 focus:outline-none">
                </div>
            </div>
            
            <!-- Max Score -->
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Maksimal Ball</label>
                <input type="number" name="max_score" value="10" min="1" max="100" class="w-full px-4 py-2 border-2 border-gray-300 rounded-lg focus:border-blue-500 focus:outline-none">
            </div>
            
            <!-- Hint -->
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Maslahat (iختياري)</label>
                <textarea name="hint" rows="2" placeholder="Savol bajarilishiga yordam beruvchi maslahat..." class="w-full px-4 py-2 border-2 border-gray-300 rounded-lg focus:border-blue-500 focus:outline-none"></textarea>
            </div>
            
            <!-- Buttons -->
            <div class="flex gap-4 pt-4">
                <button type="submit" class="bg-green-600 hover:bg-green-700 text-white px-6 py-2 rounded-lg font-semibold transition">
                    <i class="fas fa-check mr-2"></i>Yaratish
                </button>
                <a href="{% url 'custom_admin:questions' olympiad.id %}" class="bg-gray-600 hover:bg-gray-700 text-white px-6 py-2 rounded-lg font-semibold transition">
                    <i class="fas fa-times mr-2"></i>Bekor qilish
                </a>
            </div>
        </form>
    </div>
</div>

<script>
    const typeSelect = document.getElementById('questionType');
    const mcOptions = document.getElementById('mcOptions');
    
    typeSelect.addEventListener('change', function() {
        if (this.value === 'multiple_choice') {
            mcOptions.classList.remove('hidden');
        } else {
            mcOptions.classList.add('hidden');
        }
    });
</script>

{% endblock %}
