{% extends "base.html" %}
{% block title %}Yangi Olimpiad - Admin Panel{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto my-10">
    <div class="bg-white rounded-lg shadow-lg p-8">
        <h1 class="text-2xl font-bold text-gray-800 mb-6">
            <i class="fas fa-plus text-green-600 mr-2"></i>Yangi Olimpiad Yaratish
        </h1>
        
        <form method="POST" class="space-y-6">
            {% csrf_token %}
            
            <!-- Title -->
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Olimpiad Nomi</label>
                <input type="text" name="title" placeholder="Masalan: Matematika Olimpiadasi 2026" required class="w-full px-4 py-2 border-2 border-gray-300 rounded-lg focus:border-blue-500 focus:outline-none">
            </div>
            
            <!-- Description -->
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Tavsif</label>
                <textarea name="description" rows="4" placeholder="Olimpiad haqida batafsil ma'lumot..." class="w-full px-4 py-2 border-2 border-gray-300 rounded-lg focus:border-blue-500 focus:outline-none"></textarea>
            </div>
            
            <!-- Duration -->
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Ish Vaqti (minutlar)</label>
                <input type="number" name="duration_minutes" value="120" min="1" max="300" class="w-full px-4 py-2 border-2 border-gray-300 rounded-lg focus:border-blue-500 focus:outline-none">
            </div>
            
            <!-- Status -->
             <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Holati</label>
                <select name="status" class="w-full px-4 py-2 border-2 border-gray-300 rounded-lg focus:border-blue-500 focus:outline-none">
                    <option value="open">🟢 Ochiq</option>
                    <option value="in_progress">🟡 Jarayonda</option>
                    <option value="closed">🔴 Tugatildi</option>
                </select>
            </div>
            
            <!-- Buttons -->
            <div class="flex gap-4 pt-4">
                <button type="submit" class="bg-green-600 hover:bg-green-700 text-white px-6 py-2 rounded-lg font-semibold transition">
                    <i class="fas fa-check mr-2"></i>Yaratish
                </button>
                <a href="{% url 'custom_admin:olympiads' %}" class="bg-gray-600 hover:bg-gray-700 text-white px-6 py-2 rounded-lg font-semibold transition">
                    <i class="fas fa-times mr-2"></i>Bekor qilish
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
